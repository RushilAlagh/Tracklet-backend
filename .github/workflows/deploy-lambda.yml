name: Deploy to Lambda and Redeploy APIs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          # Matched to AWS Lambda's current stable Node.js runtime
          node-version: '20.x'

      - name: Install zip
        run: sudo apt-get install zip

      - name: Install dependencies and create lambda.zip
        run: |
          cd backend
          
          # 1. Clean up local environment to ensure no heavy binaries exist
          rm -rf node_modules package-lock.json
          
          # 2. Install production dependencies only
          # This pulls puppeteer-core and @sparticuz/chromium without the local browser binary
          npm install --production
          
          # 3. Create zip aggressively excluding bloat
          # We explicitly exclude .git, .github, and any puppeteer browser caches to stay under 250MB
          zip -rq lambda.zip . -x ".git/*" ".github/*" ".env" ".gitignore" "*.DS_Store" "README.md" "node_modules/puppeteer/.local-chromium/*"
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3 and Update Lambda function code
        run: |
          cd backend
          
          # 1. Upload to S3 (Bypasses 50MB direct upload limit)
          aws s3 cp lambda.zip s3://${{ secrets.S3_BUCKET_NAME }}/lambda.zip
          
          # 2. Update Lambda from S3
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket ${{ secrets.S3_BUCKET_NAME }} \
            --s3-key lambda.zip
            
          # 3. Wait for update to complete (Prevents race condition with API Gateway)
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Redeploy all APIs
        run: |
          aws apigateway create-deployment \
            --rest-api-id ${{ secrets.API_ID }} \
            --stage-name ${{ secrets.API_STAGE }} \
            --description "Redeploy API after Lambda update via S3"